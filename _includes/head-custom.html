<!-- Mermaid.js を読み込み、Jekyll (Rouge) が ```mermaid を <code class="language-mermaid"> として出力する仕様を踏まえ、図として再描画する -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  function convertMermaidBlocks() {
    // Rouge ラッパー (div.language-mermaid > div.highlight > pre > code) と素の pre>code 双方に対応
    const rougeBlocks = document.querySelectorAll('div.language-mermaid');
    rougeBlocks.forEach((wrapper) => {
      const code = wrapper.querySelector('code');
      const text = (code ? code.textContent : wrapper.textContent).trim();
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = text;
      wrapper.replaceWith(div);
    });

    const codeBlocks = document.querySelectorAll('pre > code.language-mermaid');
    codeBlocks.forEach((code) => {
      const text = code.textContent.trim();
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = text;
      code.parentElement.replaceWith(div);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    convertMermaidBlocks();
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
    mermaid.run({ querySelector: '.mermaid' });
  });
</script>
